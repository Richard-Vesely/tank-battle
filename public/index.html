<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tank Battle v3</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="screen active">
    <div class="title-container">
      <h1 class="game-title">TANK BATTLE</h1>
      <p class="subtitle">Strategic Arena Combat</p>
    </div>

    <div class="menu-container">
      <div class="input-group">
        <label for="player-name">YOUR NAME</label>
        <input type="text" id="player-name" maxlength="16" placeholder="Enter name..." value="Player">
      </div>

      <div class="button-group">
        <button id="btn-quickplay" class="btn btn-primary">QUICK PLAY</button>
        <button id="btn-practice" class="btn btn-practice">PRACTICE (Solo + Bots)</button>

        <div class="separator">OR</div>

        <div class="create-room-section">
          <label>GAME MODE</label>
          <div class="mode-select">
            <button class="btn mode-btn selected" data-mode="domination">DOMINATION</button>
            <button class="btn mode-btn" data-mode="ffa">FFA</button>
            <button class="btn mode-btn" data-mode="rounds">ROUNDS</button>
          </div>
          <label>ON DEATH</label>
          <div class="mode-select">
            <button class="btn penalty-btn selected" data-penalty="keep">KEEP UPGRADES</button>
            <button class="btn penalty-btn" data-penalty="lose">LOSE ALL</button>
          </div>
          <label>MAP SIZE</label>
          <div class="mode-select">
            <button class="btn mapsize-btn selected" data-mapsize="small">SMALL</button>
            <button class="btn mapsize-btn" data-mapsize="medium">MEDIUM</button>
            <button class="btn mapsize-btn" data-mapsize="large">LARGE</button>
          </div>
          <button id="btn-create" class="btn btn-secondary">CREATE ROOM</button>
        </div>

        <div class="separator">OR</div>

        <div class="join-room-section">
          <label for="room-code-input">ROOM CODE</label>
          <div class="join-row">
            <input type="text" id="room-code-input" maxlength="4" placeholder="ABCD" style="text-transform:uppercase">
            <button id="btn-join" class="btn btn-secondary">JOIN</button>
          </div>
        </div>
      </div>
    </div>

    <div id="error-message" class="error-msg"></div>
  </div>

  <!-- WAITING ROOM -->
  <div id="waiting-screen" class="screen">
    <h2>ROOM: <span id="room-code-display"></span></h2>
    <p class="mode-display">Mode: <span id="room-mode-display"></span></p>
    <div id="player-list" class="player-list"></div>
    <p class="waiting-hint">All players must be READY to start (min 2)</p>
    <button id="btn-ready" class="btn btn-primary">READY</button>
    <button id="btn-leave" class="btn btn-danger">LEAVE</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-left">
        <div id="hud-hp"></div>
        <div id="hud-currency"></div>
        <div id="hud-powerup"></div>
        <div id="hud-abilities"></div>
      </div>
      <div id="hud-center">
        <div id="hud-scores"></div>
        <div id="hud-dom-scores"></div>
      </div>
      <div id="hud-right">
        <div id="hud-lives"></div>
        <div class="hud-hint">WASD/Arrows: Move | TAB: Shop | 1-6: Stats | Shift+Key: Ability | ESC: Leave</div>
      </div>
    </div>
    <div id="game-message" class="game-message"></div>

    <!-- Upgrade Shop Overlay -->
    <div id="upgrade-shop" class="upgrade-shop">
      <div id="shop-content"></div>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameover-screen" class="screen">
    <h2 id="winner-text"></h2>
    <div id="final-scores"></div>
    <p class="return-hint">Returning to lobby...</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/constants.js"></script>
  <script src="/shared/map-generator.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/input.js"></script>
  <script src="js/network.js"></script>
  <script src="js/lobby.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
